<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>BD Gateway</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#0d1117;color:#e6edf3;min-height:100vh;display:flex;align-items:center;justify-content:center}
.container{max-width:680px;width:100%;margin:20px;background:#161b22;border-radius:12px;padding:24px;box-shadow:0 8px 32px rgba(0,0,0,.4)}
h1{font-size:20px;margin-bottom:6px}
p{font-size:13px;color:#8b949e;margin-bottom:16px}
label{font-size:13px;color:#8b949e;display:block;margin-bottom:4px}
input[type=text]{width:100%;padding:10px 12px;background:#0d1117;border:1px solid #30363d;border-radius:8px;color:#e6edf3;font-size:14px;margin-bottom:14px}
input[type=text]:focus{outline:none;border-color:#58a6ff}
#chat{background:#0d1117;border:1px solid #30363d;border-radius:8px;padding:12px;height:360px;overflow-y:auto;margin-bottom:12px;font-size:14px;line-height:1.5;white-space:pre-wrap}
.msg{margin-bottom:10px;padding:10px 14px;border-radius:10px;max-width:88%}
.user{background:#1f6feb22;border:1px solid #1f6feb44;margin-left:auto}
.bot{background:#23863622;border:1px solid #23863644}
.err{background:#da363322;border:1px solid #da363344}
.msg strong{font-size:11px;color:#8b949e;display:block;margin-bottom:4px}
.row{display:flex;gap:8px}
.row input{flex:1;padding:10px 12px;background:#0d1117;border:1px solid #30363d;border-radius:8px;color:#e6edf3;font-size:14px}
.row input:focus{outline:none;border-color:#58a6ff}
.row button{padding:10px 24px;background:#238636;border:none;border-radius:8px;color:#fff;font-size:14px;cursor:pointer;font-weight:600}
.row button:hover{background:#2ea043}
.row button:disabled{opacity:.5;cursor:default}
.info{font-size:12px;color:#8b949e;margin-top:10px;text-align:center;min-height:18px}
</style>
</head>
<body>
<div class="container">
<h1>BD Gateway</h1>
<p>Enter your key and message â€” we'll find a working model automatically</p>
<input type="text" id="key" value="lfrvr5fl-aecel39x-oz33z4ov-lzs2f26l" placeholder="Gateway API key">
<div id="chat"></div>
<div class="row">
  <input type="text" id="msg" placeholder="Type a message..." onkeydown="if(event.key==='Enter')send()">
  <button id="btn" onclick="send()">Send</button>
</div>
<div class="info" id="info"></div>
</div>
<script>
const url = 'https://buddhi-dwar.richard-brown-miami.workers.dev/v1/chat/completions';
const models = ['gpt-4o-mini','llama-3.3-70b-versatile','gemini-2.0-flash','gpt-4o','claude-3-5-sonnet','mistral-large','deepseek-chat','gemini-1.5-flash'];
let history = [];

async function send() {
  const key = document.getElementById('key').value.trim();
  const input = document.getElementById('msg');
  const txt = input.value.trim();
  if (!txt || !key) return;
  appendMsg('user','You',txt);
  input.value = '';
  toggle(false);
  info('Thinking...');
  history.push({role:'user',content:txt});
  let lastErr = '';
  for (const m of models) {
    info('Trying ' + m + '...');
    try {
      const res = await fetch(url, {
        method:'POST',
        headers:{'Authorization':'Bearer '+key,'Content-Type':'application/json'},
        body:JSON.stringify({model:m,messages:history,stream:true})
      });
      if (!res.ok) { lastErr = await res.text(); info(m + ' failed'); continue; }
      let content = '', div = addBotDiv();
      const reader = res.body.getReader(), dec = new TextDecoder();
      let buf = '';
      while (true) {
        const {done,value} = await reader.read();
        if (done) break;
        buf += dec.decode(value,{stream:true});
        for (const line of buf.split('\n').slice(0,-1)) {
          if (!line.startsWith('data: ')) continue;
          const d = line.slice(6).trim();
          if (d==='[DONE]') break;
          try { const c = JSON.parse(d).choices?.[0]?.delta?.content||''; content += c; div.textContent = content; document.getElementById('chat').scrollTop = 1e9; } catch{}
        }
        buf = buf.split('\n').slice(-1)[0]||'';
      }
      info('âœ“ ' + m);
      history.push({role:'assistant',content});
      toggle(true);
      return;
    } catch(e) { lastErr = e.message; }
  }
  appendMsg('err','Error',lastErr.slice(0,300));
  info('All providers failed');
  toggle(true);
}

function appendMsg(cls,label,text){const d=document.getElementById('chat');d.innerHTML+='<div class="msg '+cls+'"><strong>'+label+'</strong>'+escape(text)+'</div>';d.scrollTop=1e9}
function addBotDiv(){const d=document.getElementById('chat'),div=document.createElement('div');div.className='msg bot';div.innerHTML='<strong>Assistant</strong>';d.appendChild(div);return div}
function toggle(on){document.getElementById('btn').disabled=!on;document.getElementById('msg').disabled=!on}
function info(t){document.getElementById('info').textContent=t}
function escape(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
</script>
</body>
</html>
