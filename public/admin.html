<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Buddhi Dwar Admin</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,-apple-system,sans-serif}
body{display:flex;min-height:100vh;background:#0b1120;color:#e2e8f0}
.sidebar{width:220px;background:#111827;padding:20px 0;border-right:1px solid #1e293b;flex-shrink:0}
.sidebar h1{font-size:18px;color:#38bdf8;padding:0 16px 20px;border-bottom:1px solid #1e293b;margin-bottom:8px}
.sidebar a{display:flex;align-items:center;gap:10px;padding:10px 16px;color:#94a3b8;text-decoration:none;font-size:14px;cursor:pointer;transition:.15s}
.sidebar a:hover,.sidebar a.active{background:#1e293b;color:#38bdf8;border-right:3px solid #38bdf8}
.main{flex:1;padding:24px}section{display:none}section.active{display:block}
h2{font-size:20px;color:#f1f5f9;margin-bottom:20px;padding-bottom:8px;border-bottom:1px solid #1e293b}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:24px}
.card{background:#1e293b;border-radius:10px;padding:16px;border:1px solid #334155}
.card .num{font-size:28px;font-weight:700;color:#38bdf8}
.card .lbl{font-size:12px;color:#94a3b8;margin-top:4px;text-transform:uppercase;letter-spacing:.5px}
table{width:100%;border-collapse:collapse;font-size:14px;margin-bottom:16px}
th{color:#94a3b8;font-weight:600;padding:10px 8px;border-bottom:2px solid #334155;text-align:left;font-size:12px;text-transform:uppercase;letter-spacing:.5px}
td{padding:10px 8px;border-bottom:1px solid #1e293b;color:#e2e8f0}
tr:hover td{background:#111827}
input,select{padding:10px 12px;border-radius:8px;border:1px solid #475569;background:#0f172a;color:#e2e8f0;font-size:14px;width:100%;max-width:400px;margin:4px 0;outline:none;transition:.15s}
input:focus,select:focus{border-color:#38bdf8;box-shadow:0 0 0 2px rgba(56,189,248,.15)}
button{padding:10px 20px;border-radius:8px;border:none;font-size:14px;font-weight:600;cursor:pointer;margin:4px 4px 4px 0;transition:.15s}
button.primary{background:#38bdf8;color:#0b1120}button.primary:hover{background:#7dd3fc}
button.danger{background:#ef4444;color:#fff}button.danger:hover{background:#f87171}
button.secondary{background:#334155;color:#e2e8f0}button.secondary:hover{background:#475569}
pre{background:#0f172a;padding:16px;border-radius:8px;overflow:auto;font-size:13px;max-height:500px;line-height:1.5;border:1px solid #1e293b}
.tag{display:inline-block;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600}
.tag.ok{background:rgba(22,163,74,.2);color:#86efac;border:1px solid #166534}
.tag.fail{background:rgba(153,27,27,.2);color:#fca5a5;border:1px solid #991b1b}
.tag.active{background:rgba(30,64,175,.2);color:#93c5fd;border:1px solid #1e40af}
.tag.warning{background:rgba(146,64,14,.2);color:#fde68a;border:1px solid #92400e}
.tag.closed{background:rgba(22,163,74,.2);color:#86efac;border:1px solid #166534}
.tag.open{background:rgba(153,27,27,.2);color:#fca5a5;border:1px solid #991b1b}
.tag.half-open{background:rgba(146,64,14,.2);color:#fde68a;border:1px solid #92400e}
.form-row{display:flex;gap:12px;align-items:end;flex-wrap:wrap;margin-bottom:16px}
.form-row>*{flex:1;min-width:200px}
.form-row button{flex:0 0 auto}
.form-group label{display:block;font-size:12px;color:#94a3b8;margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}
.toast{position:fixed;top:20px;right:20px;padding:12px 20px;border-radius:8px;font-size:14px;z-index:1000;animation:slideIn .3s;max-width:400px}
.toast.success{background:#166534;color:#86efac;border:1px solid #22c55e}
.toast.error{background:#991b1b;color:#fca5a5;border:1px solid #ef4444}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.ico{display:inline-block;width:18px;height:18px;border-radius:4px;flex-shrink:0}
.ico-overview{background:#38bdf8}.ico-keys{background:#f59e0b}.ico-gateway{background:#a78bfa}
.ico-strategy{background:#34d399}.ico-logs{background:#f87171}.ico-analytics{background:#fb923c}
.ico-settings{background:#e2e8f0}.ico-health{background:#f472b6}.ico-setup{background:#22d3ee}
#login-overlay{position:fixed;inset:0;background:#0b1120;display:flex;align-items:center;justify-content:center;z-index:9999}
#login-overlay.hidden{display:none}
.login-box{background:#1e293b;padding:40px;border-radius:16px;border:1px solid #334155;width:360px;max-width:90vw}
.login-box input{width:100%;padding:12px;border-radius:8px;border:1px solid #475569;background:#0f172a;color:#e2e8f0;font-size:16px;outline:none}
.login-box input:focus{border-color:#38bdf8}
.pagination{display:flex;gap:8px;align-items:center;margin-top:8px;font-size:13px;color:#94a3b8}
.pagination button{padding:4px 12px;font-size:12px}
@media(max-width:768px){.sidebar{width:48px}.sidebar h1,.sidebar a span:last-child{display:none}.main{padding:16px}.grid-2{grid-template-columns:1fr}}
</style>
</head>
<body>
<div id="login-overlay">
  <div class="login-box">
    <h1 style="color:#38bdf8;margin-bottom:8px">Buddhi Dwar</h1>
    <p style="color:#94a3b8;margin-bottom:20px;font-size:14px">Admin Dashboard Login</p>
    <input id="login-pw" type="password" placeholder="Enter admin password" style="width:100%;margin-bottom:12px">
    <button class="primary" onclick="doLogin()" style="width:100%">Login</button>
    <p id="login-error" style="color:#fca5a5;font-size:13px;margin-top:8px;display:none">Invalid password</p>
  </div>
</div>
<div class="sidebar">
<h1>BD</h1>
<a onclick="showTab('overview')" id="nav-overview" class="active"><span class="ico ico-overview"></span><span>Overview</span></a>
<a onclick="showTab('keys')" id="nav-keys"><span class="ico ico-keys"></span><span>API Keys</span></a>
<a onclick="showTab('gateway')" id="nav-gateway"><span class="ico ico-gateway"></span><span>Gateway Keys</span></a>
<a onclick="showTab('strategy')" id="nav-strategy"><span class="ico ico-strategy"></span><span>Strategy</span></a>
<a onclick="showTab('logs')" id="nav-logs"><span class="ico ico-logs"></span><span>Logs</span></a>
<a onclick="showTab('analytics')" id="nav-analytics"><span class="ico ico-analytics"></span><span>Analytics</span></a>
<a onclick="showTab('settings')" id="nav-settings"><span class="ico ico-settings"></span><span>Settings</span></a>
<a onclick="showTab('health')" id="nav-health"><span class="ico ico-health"></span><span>Health Check</span></a>
<a onclick="showTab('setup')" id="nav-setup"><span class="ico ico-setup"></span><span>Setup</span></a>
<a onclick="logout()" style="margin-top:auto;border-top:1px solid #1e293b;padding-top:12px;color:#f87171"><span style="display:inline-block;width:18px;height:18px;border-radius:4px;background:#f87171;flex-shrink:0"></span><span>Logout</span></a>
</div>
<div class="main" id="main-content"></div>
<script>
function getPw() { return document.cookie.replace(/(?:(?:^|.*;\s*)bfadmin\s*=\s*([^;]*).*$)|^.*$/, "$1") || ''; }
function api(path, opts) {
  return fetch('/admin/api' + path, {
    headers: { 'Content-Type': 'application/json', ...(opts || {}).headers },
    credentials: 'same-origin', ...(opts || {})
  }).then(r => { if (r.status === 401) { document.cookie = 'bfadmin=;max-age=0'; showLogin(); throw new Error('unauthorized'); } return r.json(); });
}
function showToast(msg, type) {
  const t = document.createElement('div'); t.className = 'toast ' + type;
  t.textContent = msg; document.body.appendChild(t); setTimeout(() => t.remove(), 3000);
}
function showLogin() { document.getElementById('login-overlay').classList.remove('hidden'); document.getElementById('main-content').innerHTML = ''; }
function doLogin() {
  const pw = document.getElementById('login-pw').value;
  const err = document.getElementById('login-error');
  if (!pw) { err.style.display = 'block'; err.textContent = 'Enter a password'; return; }
  document.cookie = 'bfadmin=' + pw + ';path=/;samesite=lax';
  fetch('/admin/api/stats', { credentials: 'same-origin' }).then(r => {
    if (r.ok) { err.style.display = 'none'; document.getElementById('login-overlay').classList.add('hidden'); showTab('overview'); }
    else { document.cookie = 'bfadmin=;max-age=0'; err.style.display = 'block'; err.textContent = 'Invalid password'; }
  }).catch(() => { document.cookie = 'bfadmin=;max-age=0'; err.style.display = 'block'; err.textContent = 'Connection error'; });
}
document.getElementById('login-pw').addEventListener('keydown', function(e) { if (e.key === 'Enter') doLogin(); });
function logout() { document.cookie = 'bfadmin=;max-age=0'; showLogin(); showToast('Logged out', 'success'); }
function showTab(name) {
  document.querySelectorAll('.sidebar a').forEach(a => a.classList.remove('active'));
  const nav = document.getElementById('nav-' + name); if (nav) nav.classList.add('active');
  if (PAGES[name] && PAGES[name].render) PAGES[name].render();
}
function setContent(h) { document.getElementById('main-content').innerHTML = h; }
const PAGES = {
  overview: { title: 'Dashboard Overview', render: renderOverview },
  keys: { title: 'API Keys', render: renderKeys },
  gateway: { title: 'Gateway Keys', render: renderGateway },
  strategy: { title: 'Routing Strategy', render: renderStrategy },
  logs: { title: 'Error & Eviction Logs', render: renderLogs },
  analytics: { title: 'Analytics', render: renderAnalytics },
  settings: { title: 'Settings', render: renderSettings },
  health: { title: 'Health Check', render: renderHealth },
  setup: { title: 'Setup Guide', render: renderSetup }
};
if (!getPw()) { showLogin(); } else { document.getElementById('login-overlay').classList.add('hidden'); }
async function renderOverview() {
  const s = await api('/stats');
  const a = await api('/analytics?days=7');
  let totalCost = 0; let totalTokens = 0;
  if (Array.isArray(a)) { a.forEach(d => { totalCost += d.totalCost || 0; totalTokens += (d.totalPromptTokens || 0) + (d.totalCompletionTokens || 0); }); }
  setContent(`
    <div class="cards">
      <div class="card"><div class="num">${s.requestsToday || 0}</div><div class="lbl">Requests Today</div></div>
      <div class="card"><div class="num">${s.totalKeys || 0}</div><div class="lbl">Total Keys</div></div>
      <div class="card"><div class="num" style="color:#86efac">${s.activeKeys || 0}</div><div class="lbl">Active Keys</div></div>
      <div class="card"><div class="num" style="color:#fca5a5">${s.deadKeys || 0}</div><div class="lbl">Dead Keys</div></div>
      <div class="card"><div class="num" style="color:#fde68a">${s.warmingKeys || 0}</div><div class="lbl">Warming Keys</div></div>
      <div class="card"><div class="num" style="color:#c084fc">${s.expiredKeys || 0}</div><div class="lbl">Expired Keys</div></div>
      <div class="card"><div class="num" style="color:#fde68a">$${totalCost.toFixed(4)}</div><div class="lbl">Est. Cost (7d)</div></div>
      <div class="card"><div class="num" style="color:#93c5fd">${totalTokens.toLocaleString()}</div><div class="lbl">Tokens (7d)</div></div>
      <div class="card" style="grid-column:1/-1;border-color:#38bdf8">
        <div style="font-size:13px;color:#94a3b8;margin-bottom:4px">Your Gateway URL</div>
        <code style="font-size:15px;color:#38bdf8;word-break:break-all">https://buddhi-dwar.your-domain.workers.dev/v1/chat/completions</code>
        <div style="font-size:12px;color:#fde68a;margin-top:6px">Use a Gateway Key as Bearer token. See Setup tab for examples.</div>
      </div>
    </div>
    <h2 style="margin-top:24px">Daily Requests (7 days)</h2>
    <pre>${JSON.stringify(a, null, 2)}</pre>
  `);
}
async function renderKeys() {
  const raw = await api('/keys');
  let rows = '';
  for (const [pname, keys] of Object.entries(raw)) {
    for (const k of keys) {
      rows += '<tr><td>' + pname + '</td><td style="font-size:11px;color:#94a3b8">' + (k.label||'') + '</td>' +
        '<td><code style="font-size:11px;color:#94a3b8">' + (k.apiKey||'').slice(0,8) + '...</code></td>' +
        '<td><span class="tag warning" id="st-' + k.id + '">pending</span></td>' +
        '<td style="font-size:12px;color:#94a3b8">' + (k.addedAt ? new Date(k.addedAt).toLocaleDateString() : 'â€”') + '</td>' +
        '<td><button class="primary" onclick="testKey(\'' + pname + '\',\'' + k.id + '\')" style="padding:4px 8px;font-size:11px">Test</button> ' +
        '<button class="secondary" onclick="listModels(\'' + pname + '\',\'' + k.id + '\')" style="padding:4px 8px;font-size:11px">Models</button> ' +
        '<button class="danger" onclick="deleteKey(\'' + pname + '\',\'' + k.id + '\')" style="padding:4px 8px;font-size:11px">Del</button></td></tr>';
    }
  }
  setContent(`
    <div class="form-row">
      <div class="form-group"><label>Provider</label><select id="kp-provider"><option>anthropic</option><option>openai</option><option>google</option><option>groq</option><option>mistral</option><option>together</option><option>deepseek</option><option>cohere</option><option>openrouter</option></select></div>
      <div class="form-group"><label>API Key</label><input id="kp-key" placeholder="sk-..."></div>
      <div class="form-group"><label>Label</label><input id="kp-label" placeholder="my-key"></div>
      <button class="primary" onclick="addKey()">Add Key</button>
    </div>
    <details style="margin-bottom:16px;font-size:13px;color:#94a3b8;cursor:pointer">
      <summary style="color:#38bdf8;font-size:14px;font-weight:600">Provider Key Links</summary>
      <div style="margin-top:8px;display:flex;flex-direction:column;gap:6px">
        <a href="https://platform.openai.com/api-keys" target="_blank" style="color:#38bdf8">OpenAI api.openai.com</a>
        <a href="https://console.anthropic.com/settings/keys" target="_blank" style="color:#38bdf8">Anthropic console.anthropic.com</a>
        <a href="https://aistudio.google.com/apikey" target="_blank" style="color:#38bdf8">Google aistudio.google.com</a>
        <a href="https://console.groq.com/keys" target="_blank" style="color:#38bdf8">Groq console.groq.com</a>
        <a href="https://console.mistral.ai/api-keys" target="_blank" style="color:#38bdf8">Mistral console.mistral.ai</a>
        <a href="https://api.together.ai/settings/api-keys" target="_blank" style="color:#38bdf8">Together api.together.ai</a>
        <a href="https://platform.deepseek.com/api_keys" target="_blank" style="color:#38bdf8">Deepseek platform.deepseek.com</a>
        <a href="https://dashboard.cohere.com/api-keys" target="_blank" style="color:#38bdf8">Cohere dashboard.cohere.com</a>
        <a href="https://openrouter.ai/keys" target="_blank" style="color:#38bdf8">OpenRouter openrouter.ai</a>
      </div>
    </details>
    <table><thead><tr><th>Provider</th><th>Label</th><th>Key</th><th>Status</th><th>Added</th><th></th></tr></thead>
    <tbody>' + rows + '</tbody></table>
  `);
}
async function testKey(pname, id) {
  const el = document.getElementById('st-' + id);
  if (el) el.innerHTML = 'testing...';
  const h = await api('/test-key', { method: 'POST', body: JSON.stringify({ pname, id }) });
  const st = h.ok ? 'ok' : 'fail';
  if (el) el.className = 'tag ' + st; el.innerHTML = st;
}
async function listModels(pname, id) {
  const r = await api('/list-models', { method: 'POST', body: JSON.stringify({ pname, id }) });
  if (!r.ok) { showToast('Error: ' + (r.error || 'unknown'), 'error'); return; }
  showToast(pname + ': ' + (r.models || []).slice(0,20).join(', ') + (r.models.length > 20 ? '...' : ''), 'success');
}
async function deleteKey(pname, id) { if (!confirm('Delete key?')) return; await api('/keys', { method: 'DELETE', body: JSON.stringify({ pname, id }) }); renderKeys(); }
async function addKey() {
  const pname = document.getElementById('kp-provider').value;
  const apiKey = document.getElementById('kp-key').value;
  const label = document.getElementById('kp-label').value || (pname + '_' + Date.now());
  if (!apiKey) { showToast('Key required', 'error'); return; }
  const r = await api('/keys', { method: 'POST', body: JSON.stringify({ pname, apiKey, label }) });
  if (r.ok) { showToast('Added', 'success'); renderKeys(); }
  else { showToast(r.error || 'Failed', 'error'); }
}
async function renderGateway() {
  const g = await api('/gateway-keys');
  let rows = g.map(k => '<tr><td>' + k.word + '</td>' +
    '<td><span class="tag ' + (k.enabled?'active':'fail') + '">' + (k.enabled?'Active':'Disabled') + '</span></td>' +
    '<td>' + (k.usage||0) + '</td>' +
    '<td style="font-size:12px;color:#94a3b8">' + (k.createdAt ? new Date(k.createdAt).toLocaleDateString() : '') + '</td>' +
    '<td><button onclick="toggleGw(\'' + k.word + '\',!' + k.enabled + ')" style="padding:4px 10px;font-size:12px">' + (k.enabled?'Disable':'Enable') + '</button>' +
    '<button class="danger" onclick="deleteGw(\'' + k.word + '\')" style="padding:4px 10px;font-size:12px">Del</button></td></tr>').join('');
  setContent(`
    <div class="form-row">
      <div class="form-group"><label>Gateway Key (word/token)</label><input id="gw-word" placeholder="my-app-key"></div>
      <button class="primary" onclick="addGw()">Add Key</button>
      <button class="secondary" onclick="genGwKey()">Generate Key</button>
    </div>
    <table><thead><tr><th>Word</th><th>Status</th><th>Usage</th><th>Created</th><th></th></tr></thead>
    <tbody>${rows}</tbody></table>
  `);
}
async function toggleGw(word,enabled){await api('/gateway-keys',{method:'PATCH',body:JSON.stringify({word,enabled})}); renderGateway();}
async function deleteGw(word){if(!confirm('Delete "'+word+'"?'))return;await api('/gateway-keys',{method:'DELETE',body:JSON.stringify({word})}); renderGateway();}
async function addGw(){
  const word=document.getElementById('gw-word').value;
  if(!word){showToast('Word required','error');return}
  await api('/gateway-keys',{method:'POST',body:JSON.stringify({word})});
  showToast('Added','success'); renderGateway();
}
function genGwKey() {
  const chars = 'abcdefghijklmnopqrstuvwxyz0123456789';
  let key = '';
  for (let i = 0; i < 32; i++) {
    if (i > 0 && i % 8 === 0) key += '-';
    key += chars.charAt(Math.floor(Math.random() * chars.length));
  }
  document.getElementById('gw-word').value = key;
  showToast('Key generated: ' + key, 'success');
}
async function renderStrategy() {
  const s = await api('/strategy');
  let html = '<div class="cards">';
  for (const [prov, strat] of Object.entries(s)) {
    html += '<div class="card"><h3 style="color:#38bdf8;margin-bottom:8px">' + prov + '</h3>' +
      '<p style="font-size:13px;color:#94a3b8">Strategy: <b style="color:#e2e8f0">' + strat + '</b></p></div>';
  }
  html += '</div><h2 style="margin-top:24px">Set Strategy</h2><div class="form-row">' +
    '<div class="form-group"><label>Provider</label><select id="str-provider">' + ['anthropic','openai','google','groq','mistral','together','deepseek','cohere','openrouter'].map(p=>'<option>'+p+'</option>').join('') + '</select></div>' +
    '<div class="form-group"><label>Strategy</label><select id="str-strategy"><option>round-robin</option><option>lowest-latency</option><option>least-loaded</option></select></div>' +
    '<button class="primary" onclick="updateStr()">Set</button></div>' +
    '<h2>Raw</h2><pre>' + JSON.stringify(s, null, 2) + '</pre>';
  setContent(html);
}
async function updateStr() {
  const pname = document.getElementById('str-provider').value;
  const strategy = document.getElementById('str-strategy').value;
  await api('/strategy', { method: 'POST', body: JSON.stringify({ pname, strategy }) });
  showToast('Updated', 'success'); renderStrategy();
}
let _logPage = 0; const _logPageSize = 25; let _allLogs = [];
async function renderLogs() {
  _logPage = 0;
  _allLogs = await api('/logs');
  if(!Array.isArray(_allLogs)||_allLogs.length===0){setContent('<p>No logs</p>');return}
  renderLogPage();
}
function renderLogPage() {
  const start = _logPage * _logPageSize;
  const page = _allLogs.slice(start, start + _logPageSize);
  const rows = page.map(e => '<tr><td style="color:#94a3b8;font-size:12px">' + (e.ts ? new Date(e.ts).toLocaleString() : (e.evictedAt ? new Date(e.evictedAt).toLocaleString() : 'â€”')) + '</td>' +
    '<td>' + (e.provider||'') + '</td><td>' + (e.keyId||'') + '</td><td>' + (e.reason||e.error||e.message||'') + '</td></tr>').join('');
  const total = _allLogs.length;
  const maxPage = Math.ceil(total / _logPageSize) - 1;
  setContent('<table><thead><tr><th>Time</th><th>Provider</th><th>Key</th><th>Message</th></tr></thead><tbody>' + rows + '</tbody></table>' +
    '<div class="pagination"><button onclick="logPrev()" ' + (_logPage<=0?'disabled':'') + '>Prev</button>' +
    '<span>Page ' + (_logPage+1) + ' of ' + (maxPage+1) + ' (' + total + ' total)</span>' +
    '<button onclick="logNext()" ' + (_logPage>=maxPage?'disabled':'') + '>Next</button></div>');
}
function logPrev() { if(_logPage>0){_logPage--;renderLogPage()} }
function logNext() { const m = Math.ceil(_allLogs.length/_logPageSize)-1; if(_logPage<m){_logPage++;renderLogPage()} }
async function renderAnalytics() {
  const a = await api('/analytics?days=30');
  if(!Array.isArray(a)||a.length===0){setContent('<p>No analytics data</p>');return}
  let rows = a.map(d => '<tr><td>' + (d.date||'â€”') + '</td><td>' + (d.requests||0) + '</td><td>' + (d.failures||0) + '</td>' +
    '<td>' + (d.successes||0) + '</td><td>' + ((d.totalPromptTokens||0).toLocaleString()) + '</td>' +
    '<td>' + ((d.totalCompletionTokens||0).toLocaleString()) + '</td><td>$' + ((d.totalCost||0).toFixed(4)) + '</td></tr>').join('');
  let totalReq=0,totalFail=0,totalCost=0,totalPrompt=0,totalComp=0;
  a.forEach(d=>{totalReq+=d.requests||0;totalFail+=d.failures||0;totalCost+=d.totalCost||0;totalPrompt+=d.totalPromptTokens||0;totalComp+=d.totalCompletionTokens||0;});
  setContent(`
    <div class="cards">
      <div class="card"><div class="num">${totalReq}</div><div class="lbl">Requests (30d)</div></div>
      <div class="card"><div class="num" style="color:#fca5a5">${totalFail}</div><div class="lbl">Errors (30d)</div></div>
      <div class="card"><div class="num" style="color:#fde68a">$${totalCost.toFixed(4)}</div><div class="lbl">Cost (30d)</div></div>
      <div class="card"><div class="num">${(totalPrompt+totalComp).toLocaleString()}</div><div class="lbl">Tokens (30d)</div></div>
    </div>
    <table><thead><tr><th>Date</th><th>Req</th><th>Err</th><th>Success</th><th>Prompt Tok</th><th>Comp Tok</th><th>Cost</th></tr></thead><tbody>${rows}</tbody></table>
  `);
}
async function renderSettings() {
  const s = await api('/cache');
  const w = await api('/providers');
  setContent(`
    <div class="form-group"><label>Cache TTL (seconds)</label><input id="set-ttl" type="number" value="${s.ttlSeconds||300}"></div>
    <div class="form-group"><label>Cache Enabled</label><select id="set-cache-enabled"><option value="true" ${s.enabled?'selected':''}>Yes</option><option value="false" ${!s.enabled?'selected':''}>No</option></select></div>
    <div style="margin-top:16px"><button class="primary" onclick="saveCache()">Save Cache Settings</button></div>
    <h2 style="margin-top:32px">Providers</h2>
    <pre>${JSON.stringify(w,null,2)}</pre>
  `);
}
async function saveCache() {
  const ttlSeconds = parseInt(document.getElementById('set-ttl').value) || 300;
  const enabled = document.getElementById('set-cache-enabled').value === 'true';
  await api('/cache', { method: 'POST', body: JSON.stringify({ ttlSeconds, enabled }) });
  showToast('Saved', 'success'); renderSettings();
}
async function renderHealth() {
  setContent('<p>Running health checks...</p>');
  const h = await api('/health-check');
  let cards = '';
  for(const item of h) {
    const ok = item.status === 'ok' ? 'ok' : 'fail';
    cards += '<div class="card"><h3 style="color:#38bdf8;margin-bottom:6px">' + (item.provider||'') + ' / ' + (item.keyId||'').slice(0,8) + '</h3>' +
      '<p><span class="tag ' + ok + '">' + (item.status||'?') + '</span></p>' +
      '<p style="font-size:13px;color:#94a3b8">HTTP: ' + (item.httpStatus||'â€”') + ' | CB: ' + (item.cbState||'â€”') + '</p>' +
      (item.error ? '<pre style="font-size:11px;margin-top:4px">' + item.error + '</pre>' : '') + '</div>';
  }
  setContent('<div class="cards">' + (cards || '<p>No results</p>') + '</div>');
}
