<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Buddhi Dwar Admin</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',system-ui,-apple-system,sans-serif}
body{display:flex;min-height:100vh;background:linear-gradient(135deg,#0a0e1a 0%,#0f1629 40%,#121b33 100%);color:#e2e8f0}
.sidebar{width:240px;background:rgba(17,24,39,.85);backdrop-filter:blur(12px);padding:24px 0;border-right:1px solid rgba(56,189,248,.1);flex-shrink:0;height:100vh;position:sticky;top:0;overflow-y:auto}
.sidebar h1{font-size:22px;font-weight:800;background:linear-gradient(135deg,#38bdf8,#818cf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;padding:0 20px 24px;border-bottom:1px solid rgba(56,189,248,.1);margin-bottom:12px;letter-spacing:-.5px}
.sidebar a{display:flex;align-items:center;gap:12px;padding:11px 20px;color:#8899b4;text-decoration:none;font-size:14px;font-weight:500;cursor:pointer;transition:all .2s;margin:2px 8px;border-radius:10px}
.sidebar a:hover{background:rgba(56,189,248,.08);color:#e2e8f0}
.sidebar a.active{background:linear-gradient(135deg,rgba(56,189,248,.12),rgba(129,140,248,.08));color:#38bdf8;box-shadow:inset 2px 0 0 #38bdf8}
.main{flex:1;padding:32px;max-width:1200px}section{display:none}section.active{display:block}
h2{font-size:22px;font-weight:700;color:#f1f5f9;margin-bottom:20px;padding-bottom:10px;border-bottom:1px solid rgba(56,189,248,.08);letter-spacing:-.3px}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px;margin-bottom:28px}
.card{background:linear-gradient(135deg,rgba(30,41,59,.6),rgba(30,41,59,.3));border-radius:14px;padding:20px;border:1px solid rgba(56,189,248,.08);backdrop-filter:blur(8px);transition:transform .2s,border-color .2s}
.card:hover{transform:translateY(-2px);border-color:rgba(56,189,248,.2)}
.card .num{font-size:30px;font-weight:800;color:#38bdf8;letter-spacing:-.5px}
.card .lbl{font-size:11px;color:#7488a8;margin-top:6px;text-transform:uppercase;letter-spacing:.8px;font-weight:600}
table{width:100%;border-collapse:collapse;font-size:14px;margin-bottom:16px;border-radius:12px;overflow:hidden}
th{color:#7488a8;font-weight:600;padding:14px 12px;border-bottom:1px solid rgba(56,189,248,.08);text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.8px;background:rgba(15,23,42,.4)}
td{padding:12px;border-bottom:1px solid rgba(30,41,59,.4);color:#e2e8f0}
tr:hover td{background:rgba(56,189,248,.03)}
input,select{padding:11px 14px;border-radius:10px;border:1px solid rgba(71,85,105,.4);background:rgba(15,23,42,.6);color:#e2e8f0;font-size:14px;width:100%;max-width:400px;margin:4px 0;outline:none;transition:all .2s}
input:focus,select:focus{border-color:#38bdf8;box-shadow:0 0 0 3px rgba(56,189,248,.12)}
button{padding:11px 22px;border-radius:10px;border:none;font-size:14px;font-weight:600;cursor:pointer;margin:4px 4px 4px 0;transition:all .2s;position:relative;overflow:hidden}
button:active{transform:scale(.97)}
button.primary{background:linear-gradient(135deg,#38bdf8,#6366f1);color:#fff;box-shadow:0 2px 12px rgba(56,189,248,.2)}button.primary:hover{box-shadow:0 4px 20px rgba(56,189,248,.35)}
button.danger{background:linear-gradient(135deg,#ef4444,#dc2626);color:#fff;box-shadow:0 2px 12px rgba(239,68,68,.2)}button.danger:hover{box-shadow:0 4px 20px rgba(239,68,68,.35)}
button.secondary{background:rgba(51,65,85,.5);color:#e2e8f0;border:1px solid rgba(71,85,105,.3)}button.secondary:hover{background:rgba(51,65,85,.8)}
pre{background:rgba(15,23,42,.6);padding:18px;border-radius:12px;overflow:auto;font-size:13px;max-height:500px;line-height:1.6;border:1px solid rgba(56,189,248,.08);font-family:'Fira Code','Consolas',monospace}
.tag{display:inline-block;padding:3px 12px;border-radius:20px;font-size:11px;font-weight:600;letter-spacing:.3px}
.tag.ok{background:rgba(22,163,74,.15);color:#86efac;border:1px solid rgba(22,163,74,.3)}
.tag.fail{background:rgba(239,68,68,.15);color:#fca5a5;border:1px solid rgba(239,68,68,.3)}
.tag.active{background:rgba(59,130,246,.15);color:#93c5fd;border:1px solid rgba(59,130,246,.3)}
.tag.warning{background:rgba(234,179,8,.15);color:#fde68a;border:1px solid rgba(234,179,8,.3)}
.tag.closed{background:rgba(22,163,74,.15);color:#86efac;border:1px solid rgba(22,163,74,.3)}
.tag.open{background:rgba(239,68,68,.15);color:#fca5a5;border:1px solid rgba(239,68,68,.3)}
.tag.half-open{background:rgba(234,179,8,.15);color:#fde68a;border:1px solid rgba(234,179,8,.3)}
.form-row{display:flex;gap:14px;align-items:end;flex-wrap:wrap;margin-bottom:20px}
.form-row>*{flex:1;min-width:200px}
.form-row button{flex:0 0 auto}
.form-group label{display:block;font-size:11px;color:#7488a8;margin-bottom:6px;text-transform:uppercase;letter-spacing:.8px;font-weight:600}
.toast{position:fixed;top:24px;right:24px;padding:14px 24px;border-radius:12px;font-size:14px;font-weight:500;z-index:1000;animation:slideIn .35s cubic-bezier(.16,1,.3,1);max-width:420px;backdrop-filter:blur(12px);box-shadow:0 8px 32px rgba(0,0,0,.4)}
.toast.success{background:rgba(22,163,74,.2);color:#86efac;border:1px solid rgba(22,163,74,.3)}
.toast.error{background:rgba(239,68,68,.2);color:#fca5a5;border:1px solid rgba(239,68,68,.3)}
@keyframes slideIn{from{transform:translateX(120%) scale(.9);opacity:0}to{transform:translateX(0) scale(1);opacity:1}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.ico{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:6px;flex-shrink:0;font-size:11px;font-weight:700}
.ico-overview{background:rgba(56,189,248,.15);color:#38bdf8}.ico-keys{background:rgba(245,158,11,.15);color:#f59e0b}
.ico-gateway{background:rgba(167,139,250,.15);color:#a78bfa}.ico-strategy{background:rgba(52,211,153,.15);color:#34d399}
.ico-logs{background:rgba(248,113,113,.15);color:#f87171}.ico-analytics{background:rgba(251,146,60,.15);color:#fb923c}
.ico-settings{background:rgba(148,163,184,.15);color:#e2e8f0}.ico-health{background:rgba(244,114,182,.15);color:#f472b6}
.ico-setup{background:rgba(34,211,238,.15);color:#22d3ee}

#loading-bar{position:fixed;top:0;left:0;height:3px;background:linear-gradient(90deg,#38bdf8,#818cf8,#38bdf8);background-size:200% 100%;z-index:99999;transition:width .4s cubic-bezier(.16,1,.3,1),opacity .3s;width:0;opacity:0;border-radius:0 2px 2px 0;box-shadow:0 0 12px rgba(56,189,248,.5)}
#loading-bar.active{opacity:1}button.loading{pointer-events:none;opacity:.7;position:relative}button.loading::after{content:'';position:absolute;inset:0;border-radius:inherit;background:linear-gradient(90deg,transparent,rgba(255,255,255,.1),transparent);background-size:200% 100%;animation:shimmer 1.2s infinite}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.pagination{display:flex;gap:8px;align-items:center;margin-top:12px;font-size:13px;color:#7488a8}
.pagination button{padding:6px 14px;font-size:12px;border-radius:8px}
summary{color:#38bdf8;font-weight:600;cursor:pointer;padding:8px 0;font-size:14px}
details{background:rgba(15,23,42,.3);border-radius:12px;padding:8px 16px;border:1px solid rgba(56,189,248,.06);margin-bottom:16px}
.page-desc{background:rgba(56,189,248,.06);border-left:3px solid #38bdf8;padding:12px 16px;border-radius:0 10px 10px 0;margin-bottom:20px;font-size:13px;color:#94a3b8;line-height:1.6}
.key-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
.key-card{background:linear-gradient(135deg,rgba(30,41,59,.6),rgba(30,41,59,.3));border-radius:14px;padding:16px;border:1px solid rgba(56,189,248,.08);transition:transform .2s,border-color .2s}.key-card:hover{transform:translateY(-2px);border-color:rgba(56,189,248,.2)}
@media(max-width:768px){.sidebar{width:60px;padding:16px 0}.sidebar h1,.sidebar a span:last-child{display:none}.sidebar a{justify-content:center;padding:11px 0;margin:2px 6px}.main{padding:20px}.grid-2{grid-template-columns:1fr}}
@media(max-width:480px){.sidebar{width:48px}.main{padding:16px}.cards{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<div id="loading-bar"></div>
<div class="sidebar">
<h1>Buddhi Dwar</h1>
<a onclick="showTab('overview')" id="nav-overview" class="active"><span class="ico ico-overview">&#9679;</span><span>Overview</span></a>
<a onclick="showTab('keys')" id="nav-keys"><span class="ico ico-keys">&#9881;</span><span>API Keys</span></a>
<a onclick="showTab('gateway')" id="nav-gateway"><span class="ico ico-gateway">&#128274;</span><span>Gateway Keys</span></a>
<a onclick="showTab('strategy')" id="nav-strategy"><span class="ico ico-strategy">&#8644;</span><span>Strategy</span></a>
<!-- logs and req-logs removed (KV space) -->
<a onclick="showTab('analytics')" id="nav-analytics"><span class="ico ico-analytics">&#128200;</span><span>Analytics</span></a>
<a onclick="showTab('usage')" id="nav-usage"><span class="ico ico-overview">&#128200;</span><span>Usage</span></a>
<a onclick="showTab('health')" id="nav-health"><span class="ico ico-health">&#10003;</span><span>Health Check</span></a>
<a onclick="showTab('setup')" id="nav-setup"><span class="ico ico-setup">&#8505;</span><span>Setup</span></a>
<a onclick="logout()" style="margin-top:auto;color:#f87171"><span class="ico" style="background:rgba(248,113,113,.15);color:#f87171">&#8594;</span><span>Logout</span></a>
</div>
<div class="main" id="main-content"></div>
<script>
let _loadingCount = 0;
function showLoading() { _loadingCount++; const b = document.getElementById('loading-bar'); if (b) { b.style.width = '30%'; b.classList.add('active'); } }
function hideLoading() { _loadingCount--; if (_loadingCount <= 0) { _loadingCount = 0; const b = document.getElementById('loading-bar'); if (b) { b.style.width = '100%'; setTimeout(() => { b.style.width = '0'; b.classList.remove('active'); }, 300); } } }
function api(path, opts) {
  showLoading();
  const hdrs = { 'Content-Type': 'application/json', ...(opts || {}).headers };
  return fetch('/admin/api' + path, {
    headers: hdrs,
    credentials: 'same-origin', ...(opts || {})
  }).then(r => { hideLoading(); if (r.status === 401) { window.location.href = "/admin/api/logout"; throw new Error('unauthorized'); } return r.json(); }).catch(e => { hideLoading(); throw e; });
}
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#x27;'); }
function cap(s) { return s.charAt(0).toUpperCase() + s.slice(1); }

function showToast(msg, type) {
  const ico = type === 'success' ? '\u2713' : type === 'error' ? '\u2717' : '\u2139';
  const t = document.createElement('div'); t.className = 'toast ' + type;
  t.innerHTML = '<span style="margin-right:10px;font-size:16px">' + ico + '</span>';
  t.appendChild(document.createTextNode(msg));
  document.body.appendChild(t); setTimeout(() => t.remove(), 3500);
}
function logout() { window.location.href = "/admin/api/logout"; }

const PROVIDER_URLS = {
  groq: 'https://console.groq.com/keys', google: 'https://aistudio.google.com/apikey',
  openrouter: 'https://openrouter.ai/keys', mistral: 'https://console.mistral.ai/api-keys',
  deepseek: 'https://platform.deepseek.com/api_keys', together: 'https://api.together.ai/settings/api-keys',
  cerebras: 'https://console.cerebras.ai/api-keys', alibaba: 'https://bailian.console.aliyun.com/',
  ai21: 'https://studio.ai21.com/account/api-keys', huggingface: 'https://huggingface.co/settings/tokens',
  nvidia: 'https://build.nvidia.com/nim', cohere: 'https://dashboard.cohere.com/api-keys'
};
const PROVIDER_COLORS = {
  groq:'#f55036', google:'#4285f4', openrouter:'#10a37f', mistral:'#ff6d00',
  deepseek:'#4f46e5', together:'#7c3aed', cerebras:'#06b6d4', alibaba:'#f97316',
  ai21:'#8b5cf6', huggingface:'#eab308', nvidia:'#76b900', cohere:'#06d6a0'
};
function logo(pname) {
  const c = PROVIDER_COLORS[pname] || '#38bdf8';
  return '<span style="display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:6px;background:' + c + ';color:#fff;font-size:12px;font-weight:700;margin-right:8px;flex-shrink:0">' + pname[0].toUpperCase() + '</span>';
}
function showTab(name) {
  document.querySelectorAll('.sidebar a').forEach(a => a.classList.remove('active'));
  const nav = document.getElementById('nav-' + name); if (nav) nav.classList.add('active');
  if (PAGES[name] && PAGES[name].render) PAGES[name].render();
}
function setContent(h) {
  const el = document.getElementById('main-content');
  el.style.opacity = '0';
  setTimeout(() => { el.innerHTML = h; el.style.transition = 'opacity .25s'; el.style.opacity = '1'; }, 50);
}
const PAGES = {
  overview: { title: 'Dashboard Overview', render: renderOverview },
  keys: { title: 'API Keys', render: renderKeys },
  gateway: { title: 'Gateway Keys', render: renderGateway },
  strategy: { title: 'Routing Strategy', render: renderStrategy },
  // logs and req-logs removed (KV space)
  analytics: { title: 'Analytics', render: renderAnalytics },
  usage: { title: 'Usage & Limits', render: renderUsage },
  health: { title: 'Health Check', render: renderHealth },
  setup: { title: 'Setup Guide', render: renderSetup }
};
showTab('overview');
async function renderOverview() {
  const s = await api('/stats');
  const a = await api('/analytics?days=7');
  let totalCost = 0; let totalTokens = 0;
  if (Array.isArray(a)) { a.forEach(d => { totalCost += d.totalCost || 0; totalTokens += (d.totalPromptTokens || 0) + (d.totalCompletionTokens || 0); }); }
  const copyUrl = () => { navigator.clipboard.writeText('https://buddhi-dwar.richard-brown-miami.workers.dev/v1/chat/completions'); showToast('URL copied', 'success'); };
  setContent(`
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
      <h2 style="margin:0;border:none;padding:0">Dashboard Overview</h2>
      <span style="font-size:12px;color:#7488a8">${new Date().toLocaleTimeString()}</span>
    </div>
    <div class="page-desc">Monitor overall gateway performance: request count, key health by status (active/dead/expired/warming), estimated cost and token usage across all providers over the last 7 days.</div>
    <div class="cards">
      <div class="card" style="background:linear-gradient(135deg,rgba(56,189,248,.08),rgba(99,102,241,.05))"><div class="num">${s.requestsToday || 0}</div><div class="lbl">Requests Today</div></div>
      <div class="card" style="background:linear-gradient(135deg,rgba(99,102,241,.08),rgba(139,92,246,.05))"><div class="num">${s.totalKeys || 0}</div><div class="lbl">Total Keys</div></div>
      <div class="card" style="background:linear-gradient(135deg,rgba(34,197,94,.08),rgba(22,163,74,.05))"><div class="num" style="color:#86efac">${s.activeKeys || 0}</div><div class="lbl" style="color:#86efac">Active Keys</div></div>
      <div class="card" style="background:linear-gradient(135deg,rgba(239,68,68,.08),rgba(220,38,38,.05))"><div class="num" style="color:#fca5a5">${s.deadKeys || 0}</div><div class="lbl" style="color:#fca5a5">Dead Keys</div></div>
      <div class="card" style="background:linear-gradient(135deg,rgba(234,179,8,.08),rgba(202,138,4,.05))"><div class="num" style="color:#fde68a">${s.warmingKeys || 0}</div><div class="lbl" style="color:#fde68a">Warming Keys</div></div>
      <div class="card" style="background:linear-gradient(135deg,rgba(192,132,252,.08),rgba(168,85,247,.05))"><div class="num" style="color:#c084fc">${s.expiredKeys || 0}</div><div class="lbl" style="color:#c084fc">Expired Keys</div></div>
      <div class="card" style="background:linear-gradient(135deg,rgba(251,191,36,.08),rgba(245,158,11,.05))"><div class="num" style="color:#fde68a">$${totalCost.toFixed(4)}</div><div class="lbl" style="color:#fde68a">Est. Cost (7d)</div></div>
      <div class="card" style="background:linear-gradient(135deg,rgba(59,130,246,.08),rgba(37,99,235,.05))"><div class="num" style="color:#93c5fd">${totalTokens.toLocaleString()}</div><div class="lbl" style="color:#93c5fd">Tokens (7d)</div></div>
    </div>
    <div class="card" style="grid-column:1/-1;border-color:rgba(56,189,248,.25);background:linear-gradient(135deg,rgba(56,189,248,.06),rgba(99,102,241,.04));margin-bottom:20px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
        <span style="font-size:12px;color:#7488a8;font-weight:600;text-transform:uppercase;letter-spacing:.6px">Your Gateway URL</span>
        <button onclick="${copyUrl}" class="secondary" style="padding:6px 14px;font-size:12px;margin:0">Copy URL</button>
      </div>
      <code style="font-size:14px;color:#38bdf8;word-break:break-all;display:block;padding:10px 14px;background:rgba(15,23,42,.4);border-radius:8px;font-family:'Fira Code','Consolas',monospace">https://buddhi-dwar.richard-brown-miami.workers.dev/v1/chat/completions</code>
      <div style="font-size:12px;color:#fde68a;margin-top:8px">Use a Gateway Key as Bearer token. See Setup tab for examples.</div>
    </div>
    <h2 style="margin-top:8px">Provider Usage Today</h2>
    <div class="cards" id="usage-mini" style="grid-template-columns:repeat(auto-fit,minmax(200px,1fr))">Loading...</div>
    <h2 style="margin-top:8px">Provider Breakdown (7 days)</h2>
    <div class="cards" id="provider-breakdown" style="grid-template-columns:repeat(auto-fit,minmax(280px,1fr))">Loading...</div>
  `);
  try {
    const ur = await api('/key-usage');
    const ud = ur.providers || ur;
    const t = ur.totals || { requests: 0, successes: 0, failures: 0, promptTokens: 0, completionTokens: 0, cost: 0, keys: 0 };
    let remReq = 0, remTok = 0;
    for (const [pn, pd] of Object.entries(ud)) { for (const k of pd.keys) {
      if (k.rateLimit) { remReq += parseInt(k.rateLimit['x-ratelimit-remaining-requests'] || k.rateLimit['x-ratelimit-remaining'] || 0); remTok += parseInt(k.rateLimit['x-ratelimit-remaining-tokens'] || 0); }
    }}
    const el = document.getElementById('usage-mini');
    if (!el) return;
    let cards = '<div class="card" style="padding:12px 16px;background:linear-gradient(135deg,rgba(56,189,248,.08),rgba(99,102,241,.05))"><div style="font-size:16px;font-weight:700;color:#38bdf8">' + t.requests + '</div><div style="font-size:10px;color:#7488a8">Total Req</div></div>' +
      '<div class="card" style="padding:12px 16px"><div style="font-size:16px;font-weight:700;color:#86efac">' + remReq + '</div><div style="font-size:10px;color:#7488a8">Remaining Req</div></div>' +
      '<div class="card" style="padding:12px 16px"><div style="font-size:16px;font-weight:700;color:#93c5fd">' + remTok.toLocaleString() + '</div><div style="font-size:10px;color:#7488a8">Remaining Tok</div></div>' +
      '<div class="card" style="padding:12px 16px"><div style="font-size:16px;font-weight:700;color:#fde68a">$' + t.cost.toFixed(4) + '</div><div style="font-size:10px;color:#7488a8">Total Cost</div></div>';
    for (const [pn, pd] of Object.entries(ud)) {
      const lim = pd.limit || {}; const dReq = lim.dailyRequests || 999999;
      let tr = 0; for (const k of pd.keys) tr += k.usage.requests;
      const pct = Math.min(100, Math.round(tr / dReq * 100));
      const col = pct > 80 ? '#f87171' : pct > 50 ? '#fbbf24' : '#38bdf8';
      cards += '<div class="card" style="padding:12px 16px"><div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px"><span>' + esc(pn) + '</span><span style="color:' + col + '">' + tr + '</span></div>' +
        '<div style="height:6px;background:rgba(71,85,105,.4);border-radius:3px;overflow:hidden"><div style="width:' + pct + '%;height:100%;background:' + col + ';border-radius:3px"></div></div>' +
        '<div style="font-size:10px;color:#7488a8;margin-top:2px">limit: ' + dReq + ' req/day</div></div>';
    }
    el.innerHTML = cards || '<p style="color:#94a3b8">No data</p>';
  } catch {}
  try {
    const pb = document.getElementById('provider-breakdown');
    if (!pb) return;
    const prov = {};
    if (Array.isArray(a)) { a.forEach(d => { if (!d.providerStats) return; for (const [pn, pd] of Object.entries(d.providerStats)) { if (!prov[pn]) prov[pn] = { r:0,s:0,f:0,tokP:0,tokC:0,c:0 }; prov[pn].r += pd.requests||0; prov[pn].s += pd.successes||0; prov[pn].f += pd.failures||0; prov[pn].tokP += pd.totalPromptTokens||0; prov[pn].tokC += pd.totalCompletionTokens||0; prov[pn].c += pd.totalCost||0; } }); }
    let pc = '';
    for (const [pn, pd] of Object.entries(prov)) {
      const rate = pd.r > 0 ? (pd.s / pd.r * 100).toFixed(0) : '-';
      pc += '<div class="card" style="padding:14px 16px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px"><span style="font-weight:600;font-size:13px">' + esc(pn) + '</span><span style="font-size:13px;color:#38bdf8;font-weight:700">' + pd.r + ' req</span></div>' +
        '<div style="display:flex;gap:16px;font-size:11px;color:#7488a8;flex-wrap:wrap"><span>âœ“ <span style="color:#86efac">' + pd.s + '</span></span><span>âœ— <span style="color:#fca5a5">' + pd.f + '</span></span><span>rate <span style="color:#38bdf8">' + rate + '%</span></span>' +

async function getKey(pname, id) {
  try {
    const r = await api('/keys?full=1&pname=' + encodeURIComponent(pname) + '&id=' + encodeURIComponent(id));
    if (r.apiKey) {
      const code = document.getElementById('kc-' + id);
      if (code) { code.textContent = r.apiKey; code.style.userSelect = 'auto'; }
    }
  } catch {}
}
async function saveKey(pname) {
  const input = document.getElementById('kpin-' + pname);
  const apiKey = input.value.trim();
  if (!apiKey) { showToast('Enter API key', 'error'); return; }
  const label = pname + '_' + Date.now();
  input.disabled = true;
  try {
    const r = await api('/keys', { method: 'POST', body: JSON.stringify({ pname, apiKey, label }) });
    if (r.ok) {
      await api('/test-key', { method: 'POST', body: JSON.stringify({ pname, id: r.id }) });
      showToast('Key saved and tested', 'success');
    } else {
      showToast(r.error || 'Failed to save key', 'error');
    }
  } catch { showToast('Error saving key', 'error'); }
  renderKeys();
}
async function renderGateway() {
  const g = await api('/gateway-keys');
  let rows = g.map(k => '<tr data-word="' + esc(k.word) + '" data-enabled="' + k.enabled + '"><td>' + esc(k.word) + '</td>' +

async function toggleGw(el){const tr=el.closest('tr');const word=tr.dataset.word;const enabled=tr.dataset.enabled==='true'?false:true;await api('/gateway-keys',{method:'PATCH',body:JSON.stringify({word,enabled})}); renderGateway();}
async function deleteGw(el){const word=el.closest('tr').dataset.word;if(!confirm('Delete "'+word+'"?'))return;await api('/gateway-keys',{method:'DELETE',body:JSON.stringify({word})}); renderGateway();}
async function addGw(){
  const word=document.getElementById('gw-word').value;
  if(!word){showToast('Word required','error');return}
  await api('/gateway-keys',{method:'POST',body:JSON.stringify({word})});
  showToast('Added','success'); renderGateway();
}
async function genGwKey() {
  const chars = 'abcdefghijklmnopqrstuvwxyz0123456789';
  let key = '';
  for (let i = 0; i < 32; i++) {
    if (i > 0 && i % 8 === 0) key += '-';
    key += chars.charAt(Math.floor(Math.random() * chars.length));
  }
  const r = await api('/gateway-keys', { method: 'POST', body: JSON.stringify({ word: key }) });
  if (r.ok) { showToast('Key generated and saved: ' + key, 'success'); renderGateway(); }
  else { showToast('Failed to save key', 'error'); }
}

    '<div class="card" style="background:linear-gradient(135deg,rgba(59,130,246,.08),rgba(37,99,235,.05))"><div class="num" style="color:#93c5fd">' + (totals.promptTokens + totals.completionTokens).toLocaleString() + '</div><div class="lbl" style="color:#93c5fd">Total Tokens</div></div>' +
    '<div class="card" style="background:linear-gradient(135deg,rgba(251,191,36,.08),rgba(245,158,11,.05))"><div class="num" style="color:#fde68a">$' + totals.cost.toFixed(6) + '</div><div class="lbl" style="color:#fde68a">Total Cost</div></div>' +
    '<div class="card"><div class="num">' + totals.keys + '</div><div class="lbl">Active Keys</div></div>' +
    '</div><div class="cards" style="grid-template-columns:repeat(auto-fit,minmax(280px,1fr))">';
  for (const [pname, pdata] of Object.entries(data)) {
    let totReq = 0, totTok = 0, totCost = 0;
    let rlHtml = '';
    for (const k of pdata.keys) { 
      totReq += k.usage.requests; totTok += k.usage.promptTokens + k.usage.completionTokens; totCost += k.usage.cost;
      if (k.rateLimit) {
        const rrem = k.rateLimit['x-ratelimit-remaining-requests'] || k.rateLimit['x-ratelimit-remaining'] || '?';
        const rlim = k.rateLimit['x-ratelimit-limit-requests'] || k.rateLimit['x-ratelimit-limit'] || '?';
        const trem = k.rateLimit['x-ratelimit-remaining-tokens'] || '?';
        const tlim = k.rateLimit['x-ratelimit-limit-tokens'] || '?';
        rlHtml += '<p style="font-size:11px;color:#86efac;margin-top:4px">Rate limit: ' + rrem + '/' + rlim + ' req, ' + trem + '/' + tlim + ' tok</p>';
      }
    }
    html += '<div class="card" style="margin-bottom:16px"><h3 style="color:#38bdf8;margin-bottom:12px">' + esc(pname) + '</h3>' +
      '<p style="font-size:13px;color:#e2e8f0;margin-bottom:4px">Requests: ' + totReq + '</p>' +
      '<p style="font-size:13px;color:#93c5fd;margin-bottom:4px">Tokens: ' + totTok.toLocaleString() + '</p>' +
      (totCost > 0 ? '<p style="font-size:12px;color:#fde68a">Cost: $' + totCost.toFixed(6) + '</p>' : '') +
      rlHtml +
      '<p style="font-size:11px;color:#7488a8">' + pdata.keys.length + ' key(s)</p></div>';
  }
  if (html === '<div class="cards" style="grid-template-columns:repeat(auto-fit,minmax(280px,1fr))">') html += '<p style="color:#94a3b8">No usage data yet</p>';
  html += '</div>';
  setContent(html);
}
